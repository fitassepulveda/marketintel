# Source inventory, organized by intelligence area.
#
# type: rss    -> pulled by src/ingest/rss.py (free)
# type: yutori -> scraped + enriched by src/ingest/yutori.py (paid, use sparingly)
#
# verify: true  -> feed URL could not be confirmed from the build environment;
#                  check with: python scripts/verify_sources.py
# Feeds without the flag were verified live on 2026-06-12 (returned valid RSS/Atom).
#
# Sites with NO public RSS get a free Google News "site:" query feed as a proxy
# (headlines only, links redirect through news.google.com), plus yutori where
# full-text scraping is worth paying for.

national_policy:
  # CMS's own /newsroom/rss-feeds is malformed (HTML titles, no dates) and Google News
  # doesn't index cms.gov pages, so use a dated keyword query for CMS policy coverage.
  - { name: CMS Newsroom,        type: rss,    url: "https://news.google.com/rss/search?q=%22Centers+for+Medicare+%26+Medicaid+Services%22+OR+%22CMS+final+rule%22+OR+%22CMS+proposed+rule%22&hl=en-US&gl=US&ceid=US:en" }
  - { name: HHS News,            type: rss,    url: "https://www.hhs.gov/rss/news.xml" }  # native RSS verified live 2026-06-22
  - { name: FDA Press Releases,  type: rss,    url: "https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/press-releases/rss.xml" }
  - { name: Healthcare Dive,     type: rss,    url: "https://www.healthcaredive.com/feeds/news/" }
  - { name: Becker's Hospital Review, type: rss, url: "https://www.beckershospitalreview.com/feed/" }  # native RSS verified live 2026-06-22 (Cloudflare may flake intermittently)
  - { name: Modern Healthcare (headlines), type: rss,
      url: "https://news.google.com/rss/search?q=site:modernhealthcare.com&hl=en-US&gl=US&ceid=US:en",
      }
  # Modern Healthcare Yutori dropped 2026-06-22 — paywalled, and headlines already covered by the Google News RSS above.
  # AHCA (FL Agency for Health Care Administration) — hospital licensing, CON, Medicaid. Gov site,
  # no RSS -> Yutori scout. Activate with: setup_scouts.py --force --sources "AHCA Florida".
  - { name: AHCA Florida, type: yutori, url: "https://ahca.myflorida.com/agency-administration/chief-of-staff-office/office-of-communications/press-releases" }

south_florida_competitive:
  # Competitor newsrooms: none expose a working public RSS feed (checked 2026-06-12;
  # Jackson/UM timed out, Cleveland Clinic /feed returns empty).
  # Free coverage via Google News queries below; yutori for full-text enrichment.
  # NOTE: confirm/edit this watchlist with leadership (plan task 0.4).
  - { name: Baptist Health South Florida, type: yutori, url: "https://baptisthealth.net/baptist-health-news" }
  - { name: Jackson Health System,        type: yutori, url: "https://jacksonhealth.org/news" }
  - { name: University of Miami Health System, type: rss, url: "https://news.med.miami.edu/feed/" }  # native WordPress RSS verified live 2026-06-22
  - { name: Cleveland Clinic Florida,     type: yutori, url: "https://newsroom.clevelandclinic.org" }
  - { name: Memorial Healthcare System,   type: yutori, url: "https://www.mhs.net/news" }
  - { name: Mount Sinai Medical Center,   type: yutori, url: "https://www.msmc.com/about-us/news" }
  - { name: HCA Florida Healthcare,       type: yutori, url: "https://www.hcafloridahealthcare.com/about-us/newsroom" }
  - { name: Nicklaus Children's Hospital, type: yutori, url: "https://www.nicklauschildrens.org/about-us/news" }
  # Free Google News monitors (headlines for every competitor, runs daily at no cost):
  - { name: GNews - Jackson Health,   type: rss, url: "https://news.google.com/rss/search?q=%22Jackson+Health+System%22&hl=en-US&gl=US&ceid=US:en" }
  - { name: GNews - Baptist Health SF, type: rss, url: "https://news.google.com/rss/search?q=%22Baptist+Health+South+Florida%22&hl=en-US&gl=US&ceid=US:en" }
  - { name: GNews - UHealth Miami,    type: rss, url: "https://news.google.com/rss/search?q=%22University+of+Miami+Health%22+OR+%22UHealth%22&hl=en-US&gl=US&ceid=US:en" }
  - { name: GNews - Cleveland Clinic FL, type: rss, url: "https://news.google.com/rss/search?q=%22Cleveland+Clinic%22+Florida&hl=en-US&gl=US&ceid=US:en" }
  - { name: GNews - Memorial Healthcare, type: rss, url: "https://news.google.com/rss/search?q=%22Memorial+Healthcare+System%22+Florida&hl=en-US&gl=US&ceid=US:en" }
  - { name: South Florida Business Journal (Health), type: rss,
      url: "https://news.google.com/rss/search?q=site:bizjournals.com/southflorida+health&hl=en-US&gl=US&ceid=US:en",
      }
  # Regional healthcare-industry trade outlet — health-focused WordPress feed (whole feed relevant).
  - { name: South Florida Hospital News, type: rss, url: "https://southfloridahospitalnews.com/feed/", verify: true }
  # Removed "Miami Herald Health Care": the site:miamiherald.com+health query returned
  # general Miami news (sports/politics), not competitor intel — pure noise here.
  # General Miami Herald coverage still flows via the reputation_media feed below.

payer_insurance:
  - { name: KFF Health News,     type: rss,    url: "https://kffhealthnews.org/feed/" }
  # Native feed returns items without per-item dates; use a dated Google News proxy.
  - { name: Fierce Healthcare,   type: rss,    url: "https://news.google.com/rss/search?q=site:fiercehealthcare.com&hl=en-US&gl=US&ceid=US:en" }
  - { name: AHIP,                type: yutori, url: "https://www.ahip.org/news" }  # /feed and /news/feed both empty - no public RSS
  # CMS Medicare Yutori dropped 2026-06-22 — already covered by CMS Newsroom RSS (national_policy).

innovation_ai:
  - { name: STAT Health Tech,    type: rss,    url: "https://www.statnews.com/category/health-tech/feed/" }  # category feed - more targeted than site-wide /feed/
  - { name: Rock Health,         type: rss,    url: "https://rockhealth.com/feed/" }
  - { name: Healthcare IT News (headlines), type: rss,
      url: "https://news.google.com/rss/search?q=site:healthcareitnews.com&hl=en-US&gl=US&ceid=US:en",
      }
  - { name: HIMSS,               type: yutori, url: "https://www.himss.org/news" }
  # Fierce Biotech: native RSS is flaky/bot-blocked (like Fierce Healthcare) — use a Google News proxy.
  - { name: Fierce Biotech,      type: rss,    url: "https://news.google.com/rss/search?q=site:fiercebiotech.com&hl=en-US&gl=US&ceid=US:en" }

public_health_risk:
  - { name: CDC Newsroom,        type: rss,    url: "https://tools.cdc.gov/api/v2/resources/media/132608.rss" }
      # WARNING: feed is live but lastBuildDate is Aug 2023 - may be abandoned.
      # If verify_sources shows no recent items, browse https://tools.cdc.gov/podcasts/rss.asp for a current feed ID.
  - { name: WHO News,            type: rss,    url: "https://www.who.int/rss-feeds/news-english.xml" }
  - { name: Florida Dept of Health, type: rss, url: "https://www.floridahealth.gov/feed/" }  # site moved to WordPress - feed verified live
  # County health departments — same Florida Health WordPress network, /feed/ should work.
  - { name: FL Health - Broward,    type: rss, url: "https://broward.floridahealth.gov/feed/",    verify: true }
  - { name: FL Health - Miami-Dade, type: rss, url: "https://miamidade.floridahealth.gov/feed/",  verify: true }
  # Miami-Dade County press index — no RSS -> Yutori scout. NOTE: this is the COUNTY-WIDE press
  # feed (transit, parks, elections...), so it's mostly non-health noise; the LLM will filter it
  # but each scan still costs. Consider dropping it if it never surfaces health-relevant items.
  - { name: Miami-Dade County, type: yutori, url: "https://www.miamidade.gov/global/navigation/prindex.page" }

reputation_media:
  # Removed "Miami Herald (headlines)": site:miamiherald.com returned all Miami news
  # (sports/politics), not reputation signal. The org-query feed below covers UHealth
  # reputation properly.
  - { name: South Florida Sun Sentinel, type: yutori, url: "https://www.sun-sentinel.com" }  # /feed/ returns no entries - bot-blocked
  - { name: Google News (org query), type: rss,
      url: "https://news.google.com/rss/search?q=%22ORG_NAME%22&hl=en-US&gl=US&ceid=US:en",
      }
  # Local South Florida TV / alt-weekly outlets. Their native feeds are site-wide (mostly
  # crime/sports/weather) or proprietary, so we pull each via a Google News site: query
  # SCOPED to "health" — reliable RSS, targeted, free. These are lower-value/higher-noise; trim
  # any that don't earn their place.
  - { name: WSVN (Health),        type: rss, url: "https://news.google.com/rss/search?q=site:wsvn.com+health&hl=en-US&gl=US&ceid=US:en" }
  - { name: Local 10 (Health),    type: rss, url: "https://news.google.com/rss/search?q=site:local10.com+health&hl=en-US&gl=US&ceid=US:en" }
  - { name: NBC6 Miami (Health),  type: rss, url: "https://news.google.com/rss/search?q=site:nbcmiami.com+health&hl=en-US&gl=US&ceid=US:en" }
  - { name: CBS News Miami (Health), type: rss, url: "https://news.google.com/rss/search?q=site:cbsnews.com/miami+health&hl=en-US&gl=US&ceid=US:en" }
  - { name: WPBF (Health),        type: rss, url: "https://news.google.com/rss/search?q=site:wpbf.com+health&hl=en-US&gl=US&ceid=US:en" }
  - { name: Miami New Times (Health), type: rss, url: "https://news.google.com/rss/search?q=site:miaminewtimes.com+health&hl=en-US&gl=US&ceid=US:en" }
  - { name: Broward-Palm Beach New Times (Health), type: rss, url: "https://news.google.com/rss/search?q=site:browardpalmbeach.com+health&hl=en-US&gl=US&ceid=US:en" }
  - { name: SFL Times (Health),   type: rss, url: "https://news.google.com/rss/search?q=site:sfltimes.com+health&hl=en-US&gl=US&ceid=US:en" }
  # LinkedIn News: no RSS feed exists and scraping violates LinkedIn ToS.
  # Options: manual monitoring, or LinkedIn's official API (requires partnership approval).
