    FLAGSHIP SERVICE-LINE EXAMPLES (illustrative — anchor how the flagship lines should score;
    the relevance + actionability gates still apply WITHIN a flagship line):
    - "Medicare proposes cutting reimbursement for anti-VEGF retinal injections" -> 9: hits
      ophthalmology, UHealth's #1 program (Bascom Palmer), with direct revenue consequences.
    - "National eye-care group opens LASIK and retina centers across Miami-Dade" -> 8: a direct
      competitor entry against Bascom Palmer, in-region.
    - "CMS finalizes a new organ-transplant payment model / center-volume requirements" -> 9:
      directly affects the Miami Transplant Institute, a flagship high-volume line.
    - "Competitor health system launches a comprehensive stroke & neurosurgery center in Broward"
      -> 8: competition against a top-25 neurology/neurosurgery program, in-region.
    - "FDA clears a new prostate-cancer surgical robot / therapy" -> 8: a concrete clinical
      development for the Desai Sethi Urology Institute and Sylvester to evaluate and adopt.
    - "Bascom Palmer (UHealth's OWN institute) publishes a new glaucoma imaging study" -> 1:
      UHealth's own news — leadership already knows it; this is not external intelligence.
    - "A rival academic eye center reports a glaucoma imaging breakthrough" -> 5: external and
      relevant to the field, but research-awareness with no decision attached for UHealth.

    STRATEGIC-IMPACT EXAMPLES (illustrative — beyond competitors; score on strategy/direction):
    - "NIH proposes capping indirect-cost reimbursement on research grants" -> 9: direct hit to
      UHealth's research engine and finances (~$178.8M NIH).
    - "A national health system opens a new ambulatory campus in Aventura / Doral" -> 9: direct
      competition inside UHealth's own expansion zones.
    - "Major payer moves to drop or sharply cut academic-medical-center contracts" -> 8: hits
      UHealth's reimbursement and payer leverage (cf. the UnitedHealthcare negotiation).
    - "Florida moves to cut Medicaid eligibility / DSH payments" -> 8: affects UHealth's patient
      mix, volumes, and margins as the region's academic safety-net-adjacent system.
    - "South Florida nurses unionize / a regional nurse-staffing shortage deepens" -> 7:
      workforce/operational impact on a 14,628-staff system.
    - "A rival lands a major NIH center grant or recruits a star researcher" -> 7: research and
      talent competition for an academic medical center.
  # How far back to look for "new" items each run (hours). 72 = past 3 days, so a
  # Monday-morning run covers everything since Friday morning (the weekend gap).
  lookback_hours: 72
  # Re-brief scope is now CALENDAR-DAY based (see run_briefing.prioritize): a briefed story
  # stays eligible only for the rest of the SAME local day (org.timezone), so same-day re-runs
  # reproduce the briefing but a story NEVER repeats on a later day. (rebrief_after_hours below
  # is the OLD rolling-window value and is no longer used — kept only for reference; the rolling
  # window let stories briefed late one day reappear the next morning.)
  rebrief_after_hours: 24
  # For any candidate article missing a publish date, fetch the page and read the
  # date the site records (article:published_time / JSON-LD), so the 72h window
  # filters on a real publish date instead of fetch time. Persisted (fetched once).
  enrich_publish_dates: true
  enrich_timeout_seconds: 10
  # Story selection (replaces a fixed top-N): include EVERY story whose composite score is
  # at/above select_threshold, but never fewer than min_stories nor more than max_stories.
  # With current weights composite == LLM-relevance x 10, so select_threshold 80 == an LLM
  # relevance of 8/10. A strong news day surfaces more (up to max); a quiet day still shows
  # a baseline of min. score_threshold in weights.yaml (55) is still the basic floor used
  # to pad up to min_stories and to decide a true quiet day.
  # 2026-06-25: lowered 90 -> 80 from strategy-team review — they repeatedly flagged 8/10
  # stories (OpenEvidence FDA AI, CDC-nominee/United, Mount Sinai AI, Optum, 340B) as ones
  # that SHOULD appear. With the rubric now pushing non-actionable items down to <=6 and
  # max_stories capping volume at 12, an 8/10 bar yields a clean strategy-grade 8-10 report.
  select_threshold: 80
  min_stories: 5
  max_stories: 12
  # Top-line takeaways count
  takeaways: 5
  subject_prefix: "Market Intelligence Briefing"
  # How many stories the email digest renders. Keep >= max_stories so selected stories
  # aren't truncated in the email.
  digest_top_n: 12
  # Named recipient lists, kept for easy switching. The briefing sends to `digest_recipients`
  # below (the ACTIVE list) — to switch, copy the list you want into digest_recipients.
  recipient_lists:
    production:                         # the full leadership distribution (5)
      - "wef28@miami.edu"
      - "jakeherman@miami.edu"
      - "psharma@miami.edu"
      - "cjvonherrath@miami.edu"
      - "fxs1141@miami.edu"
    test:                               # test sends — the S&T testing group (not leadership)
      - "wef28@miami.edu"
      - "fxs1141@miami.edu"
  # ACTIVE list the briefing actually emails. Currently: PRODUCTION (full leadership list).
  digest_recipients:
    - "wef28@miami.edu"
    - "jakeherman@miami.edu"
    - "psharma@miami.edu"
    - "cjvonherrath@miami.edu"
    - "fxs1141@miami.edu"

  # Deterministic score FLOORS applied after LLM scoring (src/prioritize/scoring.forced_floor,
  # applied in run_briefing.prioritize). A rule fires when a SINGLE sentence of the article
  # (title + summary) contains at least one term from EVERY group in same_sentence_all (OR
  # within a group, AND across groups). The article's LLM score is then floored at `score`
  # (never lowered below an already-higher LLM score). `reason` is recorded in the rationale.
  forced_floor_rules:
    # Baptist is NOT an academic medical center today but is moving into academic medicine via
    # FIU's Herbert Wertheim College of Medicine — a direct threat to UHealth's academic-medical
    # positioning. Any sentence naming both FIU and Baptist is auto-floored to 9.
    - same_sentence_all:
        - ["FIU", "Florida International University"]
        - ["Baptist"]
      score: 9
      reason: "FIU + Baptist co-mention: Baptist is expanding into academic medicine via FIU's medical school — a direct strategic threat to UHealth's academic-medical positioning."

llm:
  # "gemini" (free tier: aistudio.google.com) or "anthropic" (console.anthropic.com)
  provider: "gemini"
  models:
    gemini:
      scoring: "gemini-2.5-flash"      # free tier: 250 requests/day, 10/min
      synthesis: "gemini-2.5-flash"
    anthropic:
      scoring: "claude-haiku-4-5-20251001"
      synthesis: "claude-sonnet-4-6"
  max_tokens_synthesis: 4000

yutori:
  # Scouting API. Auth via X-API-Key header (YUTORI_API_KEY in .env).
  base_url: "https://api.yutori.com/v1"
  # How often each scout runs, seconds (>=1800). 86400 = daily, matches the briefing.
  output_interval_seconds: 86400
  # Get Updates polling per run
  page_size: 20
  max_update_pages: 5
  timeout_seconds: 60
  # When a scout item has no publish date, fetch the article page and read it from
  # the page metadata (article:published_time / JSON-LD datePublished).
  enrich_publish_dates: true
  # If true, a scout is archived after its first pull (one-shot, for testing). Set
  # false for production so each scout keeps running on its daily schedule and the
  # briefing gets fresh competitor news every morning.
  stop_after_first_update: false
  # Local hour (in org.timezone) for each daily scout scan. New scouts are scheduled
  # so their first run — and every run after — lands at this hour. NOTE: changing this
  # only affects scouts created AFTER the change — re-run setup_scouts.py --force to
  # move existing scouts (Baptist, Jackson) to the new hour.
  scout_scan_hour_local: 5

  # Per-story deep-dive: after stories are selected for the briefing, launch a one-time
  # Yutori Research task on each of the top N to gather extra context/facts/sources,
  # which the synthesis then folds in. OFF by default — it hits a paid API (~$0.35/story)
  # and adds minutes to the run. Bounded + fail-safe: it can never delay or break the send.
  deep_dive:
    enabled: false            # set true to turn on (start with a --dry-run)
    max_stories: 3            # enrich only the top N selected stories (cost control)
    poll_timeout_seconds: 240 # give up waiting for results after this; never stalls the send
    poll_interval_seconds: 10

# Additional context: for each briefed story, SEARCH THE LIVE WEB (Gemini + Google Search
# grounding) for more/recent reporting AND check our own DB for related prior coverage,
# then add an "Additional context" note to the email — ONLY when something material is
# found. Uses Gemini's search grounding (generous free quota, then ~$35/1000 grounded
# queries; a daily run is well within free limits). Fail-safe. OFF by default — turn on
# after a --dry-run.
additional_context:
  enabled: false
  lookback_days: 120          # how far back in the DB to look for related prior articles
  max_related: 6              # max prior DB candidates shown to the model per story
  max_stories: 12             # cap how many briefed stories get the web-search step
