# General settings

org:
  # Used in LLM prompts ("why it matters to <name>") and the Google News query.
  name: "University of Miami Health System"
  short_name: "UM"                  # abbreviation used in the email digest labels
  description: >
    Academic health system in South Florida (Miami metro) with a medical school,
    hospitals, and outpatient network. Flagship service lines (2025 U.S. News): ophthalmology
    (Bascom Palmer Eye Institute, ranked #1 in the U.S.), oncology (Sylvester — South
    Florida's only NCI-designated cancer center), neurology/neurosurgery (top-25 nationally),
    urology (Desai Sethi Urology Institute), transplant (Miami Transplant Institute, one of
    the nation's largest), and rehabilitation/spinal-cord (The Miami Project to Cure Paralysis).
    Scale (FY25): ~1.7M annual patient visits, 700 beds, 40 locations across Miami-Dade/Broward/
    Palm Beach/Collier, 14,628 staff, 2,700+ providers; flagship hospital is UHealth Tower.
    Strategic direction: aggressive GROWTH/expansion (UHealth SoLé Mia in North Miami/Aventura with
    Hospital for Special Surgery, UHealth Doral, UHealth Pinecrest, the Kenneth C. Griffin Cancer
    Research Building, Tower renovation, Bascom Palmer Abu Dhabi); academic medicine + RESEARCH ($360M
    funding incl. $178.8M NIH — heavy federal-funding exposure); AI in medicine (200+ projects, top-10%
    adopter nationally); payer leverage (e.g. an active UnitedHealthcare contract negotiation);
    workforce/talent; key partnerships (Jackson Health, HSS, the VA, Siemens, Labcorp).
  region: "South Florida (Miami-Dade, Broward, Palm Beach)"
  timezone: "America/New_York"      # used when scheduling Yutori scouts

# Key question per intelligence area — drives LLM relevance scoring and synthesis
key_questions:
  national_policy: >
    What federal/state policy changes could affect margins, operations,
    academic medicine, or compliance?
  south_florida_competitive: >
    What are competing systems doing? What strategic threats or opportunities
    are emerging?
  payer_insurance: >
    How are payer dynamics changing reimbursement risk and negotiating leverage?
  innovation_ai: >
    Which technologies are becoming strategically important? Which vendors or
    innovations require monitoring?
  public_health_risk: >
    What external macro risks could disrupt healthcare delivery or strategic planning?
  reputation_media: >
    Is there emerging reputation risk or public narrative risk?

briefing:
  # Extra scoring direction injected into the LLM relevance prompt (tune freely, no code change).
  # Frame (2026-06-17): EXEC-facing — score by IMPACT ON UHEALTH'S STRATEGY & LONG-TERM DIRECTION,
  # fusing external competitive intel with operational/financial/strategic impact. Grounded in
  # UHealth's real profile (umiamihealth.org: growth/expansion, research/NIH exposure, AI, payer
  # leverage, workforce, flagship lines) + leadership's review (prioritization_review.xlsx).
  # NOTE: pharmacy/drug-pricing/PBM is explicitly NOT a priority; exclude UHealth's OWN news.
  relevance_guidance: |
    HOW TO PRIORITIZE — the audience is UHealth's STRATEGY team (not general C-suite / executive
    leadership). This distinction is decisive: a story can be "good to know" for the C-suite yet
    have NO use for a strategy team because there is nothing to act on or decide. Score by
    IMPACT ON UHEALTH'S STRATEGY AND LONG-TERM DIRECTION, and ask specifically: "can a STRATEGY
    team DO something with this — a move, a plan, a position, a thing to track because it may
    require a response?" If the honest answer is "no, it's just awareness / context for
    leadership," CAP IT at ~6 even if the topic is important and the reporting is solid (it can
    still surface on a slow day, but it is not a high scorer). This fuses external
    competitive/market intelligence WITH operational, financial, and strategic impact — the
    question is not merely "is this about a competitor?" but "does this materially affect where
    UHealth is going: its growth, competitive position, finances/reimbursement, research engine,
    operations, workforce, or reputation?" A story can score high for pure operational/strategic
    impact even with no competitor in it (e.g. a federal research-funding cut), and a competitor
    item scores high because of what it implies for UHealth's strategy.

    UHealth is South Florida's ONLY academic medical center (University of Miami / Miller School).
    Its strategic priorities right now: aggressive GROWTH/expansion across South Florida; academic
    medicine + RESEARCH (large NIH/federal exposure); flagship clinical service lines; AI in
    medicine; payer/reimbursement leverage; and workforce/talent. Use those as the lens.

    Use the FULL 0-10 range and be STRICT: most general policy or industry-trend items belong at
    3-5, not 7-9. Reserve 8-10 for news with clear, material impact on the strategy/direction
    above that leadership can act on. Apply the gates below, then place on the scale.

    GATE 1 — DIRECTLY RELEVANT TO UHEALTH? UHealth is an academic health system and care
    provider in South Florida: it runs hospitals, clinics, and a medical school. It does NOT
    manufacture drugs or sell insurance. A third party's lawsuit, settlement, or dispute (a
    PBM, an insurer, a drugmaker, another company) is relevant ONLY if its outcome would have
    a DIRECT and IMMEDIATE impact on UHealth. "Someone else's fight" or a story with only an
    indirect connection scores 2-3, regardless of how big the headline is.

    GATE 2 — ACTIONABLE? Does it imply a concrete decision, response, or plan for UHealth
    leadership? Broad "state of the market," "what it means for patients," general-awareness,
    and routine-regulatory-color pieces are NOT actionable on their own — score them 3-5 even
    when well-written and accurate. Opinion/editorial pieces are excluded entirely (score 1).
    STRATEGY-TEAM ACTIONABILITY (sharpened 2026-06-25): the bar is a STRATEGY team, not the
    C-suite. "Important for leadership to be aware of" is NOT enough. Patient-care / clinical-ops
    AI problems (e.g. an insurer's AI causing care delays), general industry commentary, and
    out-of-state policy a strategy team cannot react to are AWARENESS, not action — cap at ~6.
    A startup FUNDING ROUND is not actionable on its own — score it 3-4 (drop), NOT mid: a raise
    is just money, with nothing for UHealth to do. It becomes worth surfacing only once the
    product is RELEASED or a HOSPITAL PARTNERS with the company — that is the trigger worth
    surfacing high.

    NEVER SURFACE PARTISAN POLITICS (added 2026-06-29). Score 1-2 and exclude anything whose hook
    is partisan politics or a named political figure / administration: a court blocking or
    upholding a President's plan, an election, a partisan fight, a politician's statement. The
    STRATEGY team cannot act on the politics. IMPORTANT CARVE-OUT: this targets the political
    FRAMING, not policy substance — a concrete funding, reimbursement, or regulatory CHANGE that
    hits UHealth (NIH indirect-cost caps, Medicare/Medicaid rates, 340B, GME) is still scored on
    its direct UHealth impact via the gates, even though such policy is "political." The test:
    is the story ABOUT the political fight, or about a concrete change UHealth must respond to?

    GATE 3 — JUDGE AGAINST UHEALTH'S EXISTING POSITION. Relevance is a real GAP, THREAT, or
    OPPORTUNITY given what UHealth already IS — not a topical keyword match. UHealth is already
    strong in some areas (e.g. the talent pipeline via the Miller School), so a generic story on
    a topic where UHealth is already strong is NOT a priority for it. Likewise a "priority" topic
    (AI, research) only matters when the specific item actually touches UHealth — do not surface
    something just because it shares a keyword with a UHealth priority. Ask "does this change
    UHealth's strategy or position?", not "does it mention a topic UHealth cares about?"

    NOT a standalone priority: PHARMACY / drug-pricing / PBM / insurer policy and litigation.
    UHealth is a care provider, not a pharmacy, PBM, or insurer. Score these ONLY on direct
    UHealth impact via the gates above — a PBM lawsuit or a drug-pricing rule is general (3-5)
    or, if it's purely another company's fight, low (2-3). Do not boost an item just because
    it involves drugs, pharmacy, or PBMs.

    EXTERNAL INTELLIGENCE ONLY — EXCLUDE UHEALTH'S OWN NEWS. The audience is UHealth's own
    executive team; they already know their own announcements. Score 1-2 (drop) anything that
    is ABOUT UHealth or its own institutes/people — e.g. a gift, milestone, hire, opening,
    ranking, study, or fundraiser at Sylvester Comprehensive Cancer Center, Bascom Palmer Eye
    Institute, Desai Sethi Urology Institute, the Miami Transplant Institute, UHealth Tower,
    the Miller School of Medicine, or The Miami Project. The flagship service lines above are
    a LENS for spotting EXTERNAL developments (a competitor, a policy, a payer, a new
    technology) that affect those lines — NOT a reason to surface UHealth's own press. Sole
    exception: an external REPUTATION RISK / negative narrative about UHealth that leadership
    would need to respond to.

    SCORES HIGH (8-10) — material impact on one of these strategic vectors:
    - GROWTH / COMPETITIVE FOOTPRINT: a competitor's concrete capital, capacity, M&A,
      partnership, or service-line move in South Florida (new hospital/ER/institute/ambulatory
      center, a major gift, a system partnership) — especially in UHealth's expansion zones
      (North Miami/Aventura, Doral, Pinecrest, west Miami-Dade). Bears on growth, capacity,
      recruiting, referrals. ALSO HIGH (7-8): a competitor's MARKETING / COMMUNITY-OUTREACH /
      community-investment / branding play in UHealth's region — it's competitive positioning and
      a strategy UHealth may want to emulate, not just bricks-and-mortar. GEOGRAPHY GATES THIS: it applies to SOUTH FLORIDA competitors —
      Baptist, Jackson, Cleveland Clinic Florida, Memorial, HCA Florida, Holy Cross, Mount Sinai,
      Nicklaus. A competitor's expansion is high; a leadership change at one of them is mid (5-6).
      The SAME event at an OUT-OF-REGION system (Essentia, Franciscan Alliance, etc.) is NOISE
      (1-2) — UHealth doesn't compete with them.
      VERIFY LOCATION — NAME COLLISIONS (critical). Many competitor names are NOT unique to South
      Florida: "Jackson Hospital" in Montgomery, ALABAMA is a DIFFERENT institution from Jackson
      Health System / Jackson Memorial in Miami; "Baptist Health" exists in KY/TN/AL/TX (only
      Baptist Health SOUTH FLORIDA is our competitor); "Mount Sinai" in New York is not Mount Sinai
      Medical Center of Florida (Miami Beach); "Memorial" hospitals exist in many states. Before
      scoring ANY story as one of our competitors, CONFIRM the institution is the SOUTH FLORIDA
      one (Miami-Dade, Broward, or Palm Beach — check the dateline, city, or address in the text).
      If the location is another state/region, it is OUT-OF-REGION NOISE (1-2) no matter how
      closely the name matches. If the location CANNOT be confirmed from the article, do NOT assume
      it is the local competitor — treat it as unverified and score it low (2-3). SOLE EXCEPTION:
      if the source is the competitor's OWN website (a Yutori scout on their newsroom, e.g.
      jacksonhealth.org), the location is already verified and this check is satisfied.
    - FEDERAL/STATE FUNDING & POLICY for academic medicine: NIH / research-grant funding changes
      (UHealth runs ~$178.8M NIH), Medicare/Medicaid reimbursement, 340B, graduate medical
      education, academic-medical-center policy. Big financial/strategic exposure — score high.
    - PAYER / REIMBURSEMENT leverage affecting UHealth's own contracts (a major payer's network,
      reimbursement, or denial-policy moves). This is UHealth's payer leverage, NOT pharma/PBM.
      CURRENT WATCH — UNITEDHEALTH / UNITEDHEALTHCARE: UHealth is in an ACTIVE contract negotiation
      with United, so score ANY UnitedHealth/UnitedHealthcare/Optum-parent news UP (7-8+), even
      tangential items (a United AI rollout, a United earnings or policy move) — leadership must
      stay current on everything United right now. Revisit this once the negotiation concludes.
    - FLAGSHIP SERVICE LINES — an EXTERNAL policy, reimbursement, competitor, or clinical/tech
      development bearing on: OPHTHALMOLOGY (Bascom Palmer, #1 in US), ONCOLOGY/cancer (Sylvester),
      NEUROLOGY/NEUROSURGERY, UROLOGY (Desai Sethi), TRANSPLANT, CARDIAC, REHAB (Miami Project).
    - WORKFORCE / TALENT: nurse and physician labor markets, unionization, major competitor
      recruitment (UHealth has 14,628 staff; nursing Magnet). Score on a real GAP or THREAT —
      UHealth is already strong on the training pipeline (Miller School), so generic "health
      systems are building talent pipelines" trend pieces are mid/low for UHealth, not high.
    - AI / HEALTH-TECH (GATED): score high ONLY when it's something UHealth — a care provider /
      academic health system — could actually adopt, OR a PEER HEALTH SYSTEM (anywhere; geography
      not required for this) is concretely deploying it. AI being a UHealth priority does NOT mean
      surface every AI story. Score LOW (2-4): biotech/pharma AI (UHealth is not a biotech or
      drugmaker), pieces about a specific vendor UHealth doesn't use, and generic "AI is
      transforming healthcare" commentary. The test is "could UHealth act on or adopt this?", not
      "does it mention AI?" An FDA-CLEARED / regulatory-approved AI tool UHealth could deploy scores
      HIGH (8) — clearance makes it adoptable now; a startup AI FUNDING ROUND with no regulatory or
      adoptable movement is mid/low (~5). AI REGULATION / GOVERNANCE that UHealth must navigate as
      it builds its own AI implementation pathways is relevant (~7) even when general.
    - INTEGRATED PHARMACY (current UHealth project): UHealth is actively exploring an
      integrated-pharmacy model, so stories on integrated-pharmacy models, pharmacy-workforce
      build-out, or peers doing the same score HIGH (~8). Distinct from PBM/drug-pricing (NOT a
      priority) — this is UHealth's own care-delivery project.
    - PARTNERSHIP ECOSYSTEM: moves by or affecting Jackson Health, Hospital for Special Surgery,
      the VA, Siemens, or Labcorp.

    MIDDLE / "slow-day" tier (5-6): solid but general or non-urgent — a competitor leadership
    change, an early-stage policy proposal, a single FDA approval. Worth including only when
    nothing more actionable is available that day. ALSO HERE — "keep an eye on" items, good for
    exec AWARENESS on a slow day but NOT high scorers and NOT strategic vectors: healthcare
    RESEARCH funding/policy color and general research/clinical-trial-policy items (relevant to
    UHealth's research arm but mid for a STRATEGY audience; ~5). Surface when quiet; not high on
    their own. NOTE: CYBERSECURITY / patient-data breaches are NOT a Strategy-team function —
    they matter to other stakeholders, so keep them low (awareness only, not a priority here).

    LOW (1-4): not actionable; general market/industry trends; third-party disputes without
    direct UHealth impact; routine forecasts with no active threat; opinion pieces; awareness-only.
    Score 1-3 — near-zero strategic value even though healthcare-related: patient-facing
    human-interest / cancer-survivorship / wellness pieces, and routine local public-health
    warnings (e.g. a state opioid advisory). These do nothing for strategic direction.
    Score 1-2 — RANKINGS / LISTICLES ("47 health systems with strong finances", "273 hospitals
    with the lowest readmissions", "top 10 systems by revenue") and GENERIC OPERATIONAL
    THOUGHT-LEADERSHIP / management how-to / culture pieces (procurement best practices, "crisis
    culture", safety-event op-eds). These are content marketing, not intelligence.
    Score 1-2 — NOT relevant to UHealth's strategy or geography: RURAL-specific policy/funding
    (UHealth is urban South Florida — rural health funds / rural CMS programs don't apply);
    OUT-OF-REGION research or clinical programs (e.g. a Boston Children's research launch — wrong
    geography, and not a UHealth flagship line); pure CLINICAL / SCIENTIFIC DISCOVERIES (a tumor-
    mapping study) — for clinical teams, not strategy, UNLESS it's an external development hitting a
    UHealth flagship line; INDIVIDUAL CRIME stories (one person's fraud/arrest); and general
    REGULATORY / LEGAL filings (amicus briefs, routine rulemaking) that legal/ops teams already own.

    EXCEPTION: a genuinely major public-health or policy development of broad importance
    (e.g. a global pandemic agreement, a region-wide health emergency) may score high even if
    "general," because leadership must be aware of it.

    DAILY-REVIEW CALIBRATION (real strategy-team notes, 2026-06-29) — newest; apply this judgment:
    - "Sword Health contracted to provide AI-supported physical therapy" -> 8: the scale and the
      precedent it sets for healthcare institutions make this adoptable/precedent-setting AI.
    - "HHS details takeaways from its sweeping AI request for information" -> 7: signals incoming
      AI regulation UHealth must track as it moves toward implementation.
    - "Testosterone may offer anti-tumor activity in glioblastoma (Cleveland Clinic)" -> 6-7: a
      pure clinical/scientific finding would normally be ~2, but this is a TOP in-region competitor
      (Cleveland Clinic) advancing in ONCOLOGY — UHealth's most profitable flagship line — so it is
      competitive intel in a flagship line, not just a science story.
    - "Florida hospitals act fast to discharge gun victims" -> 2-3: patient-care / human-interest;
      UHealth cannot act on it — do NOT include (it was wrongly briefed at 7 on a quiet day).
    - "Assort Health raises $120M" -> 3-4: a funding round, nothing for UHealth to act on; drop.
    - "CDC transcript: update on the Ebola outbreak in the DRC" -> 5: a foreign disease outbreak
      with no US/Florida/UHealth impact is slow-day awareness only — NOT a typical-day inclusion
      (distinct from a genuine global pandemic, which the public-health exception still covers).
    - "Judge blocks Trump plan limiting graduate student loans" -> 2: politically-framed — never
      surface partisan-politics stories (see the PARTISAN POLITICS rule above).
    - "AI companies should release environmental impact / commit to clean energy" -> 3: ESG / AI
      commentary, not relevant or actionable for a care provider.
    - "New proposal could mean big savings on Medicare prescriptions" -> 2-3: drug-pricing /
      Medicare prescription — pharmacy/drug-pricing is NOT a UHealth priority; no direct relevance.
    - "A more connected approach for AI in healthcare" -> 2-3: generic AI thought-leadership, too
      broad, no direct implication for UHealth — not actionable.
    - "Jackson Hospital (Montgomery, Alabama) announces ..." -> 1-2: NAME COLLISION — this is the
      ALABAMA Jackson, NOT Miami's Jackson Health System. Verify location before treating any
      name-matched story as our competitor; out-of-region same-name institutions are noise.

    DAILY-REVIEW CALIBRATION (real strategy-team notes, 2026-06-25) — apply this judgment:
    - "School Board approves property sale to Broward Health" -> 10: SF competitor land/capacity
      acquisition for expansion — the exact must-know story; rank first.
    - "Jupiter Medical Center — Avenir campus breaks ground" -> 9-10: in-region, large hospital
      expansion — geographically relevant capacity growth.
    - "Optum prepares to sell some New York specialties" -> 8: United/Optum and a deal in motion —
      negotiations underway makes it highly relevant (United current-watch).
    - "CDC nominee prepares to depart UnitedHealth" -> 8: United current-watch — surface it; this
      belongs ON the report.
    - "Hospitals irate after Eli Lilly follows through on 340B ultimatum" -> 8: 340B is core
