    - "Mount Sinai to centralize oversight of its growing AI portfolio" -> 8: competitive intel on
      HOW a peer is approaching AI governance — useful as UHealth builds its own AI approach.
    - "Duke Health / Texas Health partner with a clinical-AI company" -> 7.5: same value as the
      Mount Sinai item (how competitors approach AI) but discounted because they are OUT OF REGION.
    - "Cleveland Clinic Florida announces 2026 community investments" -> 8: in-region competitor
      community-investment play — good to note and can signal expansion (bumped up from 7).
    - "Memorial Cardiac & Vascular Institute community offering" -> 8: in-region competitor
      marketing/community play — solid.
    - "Nicklaus Children's performs region's first pediatric total-hip with mixed-reality" -> 8:
      in-region competitor clinical milestone — interesting, though lighter for a STRATEGY team.
    - "Medicare's AI push snarls patients and doctors in errors and delays" -> 6: patient-care /
      clinical-ops AI awareness — fine for C-suite to know, but NOT actionable AI intelligence for
      a strategy team. Slow-day at most; should NOT be a constant high scorer.
    - "Cadence raises $100M to automate chronic-disease care" -> 4: a funding round is not
      actionable — we care when the product ships or a hospital partners with them, not the raise.
    - "States surge ahead on healthcare AI regulation" -> 7: AI regulation UHealth must track
      before implementing AI — relevant but general.
    - "US health spending spikes to $5.7T in 2025" -> 7: interesting industry context — right for
      the "also considered" tier, NOT a highlighted top story.
    - "Indiana caps prices hospitals can charge employers" -> 6: out-of-state policy a strategy
      team cannot react to — exec-awareness, not strategy-actionable.
    - "Florida Coast Medical Center completes first STEMI case" -> 6: NOT a true South Florida
      regional competitor (different part of Florida), but close enough to show on a slow day only.
    - "Oncology's 'last-mile problem': NCI care bypasses patients" -> 4-5: not actionable to UHealth.
    - "Will AI replace physicians? Epic's Judy Faulkner is skeptical" -> 4: AI opinion/commentary,
      not actionable.
    - "Florida woman admits to selling fake nursing diplomas" -> 0-1: one individual's crime, no
      UHealth tie — near-zero strategic value (do NOT let the Reputation/Media area inflate it).

    DAILY-REVIEW CALIBRATION (real exec notes, 2026-06-23) — apply this judgment:
    - "Broward Health marks construction milestone on a new medical office" -> 10: SF competitor
      capacity/expansion — must-know.
    - "Memorial Cardiac & Vascular Institute community-outreach / marketing event in the region" -> 8:
      a competitor's marketing/community-investment play in UHealth's region (positioning to emulate).
    - "Cleveland Clinic Florida announces 2026 community investment" -> 7: competitor marketing/
