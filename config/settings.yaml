    - "CMS tightens its grip on a $50B RURAL health fund" -> 2: rural funding, not UHealth's urban geography.
    - "Florida woman admits to selling fake nursing diplomas" -> 1: one person's crime — nothing for strategy.
    - "AHA files an amicus brief challenging HHS/CMS" -> 3: general legal filing legal/ops already own.
    - "Spatial map of bladder cancer reveals the tumor environment" -> 2: a clinical/scientific
      discovery, not a strategy item.

    DAILY-REVIEW CALIBRATION (real exec notes, 2026-06-22) — apply this judgment:
    - "Cleveland Clinic medical office project moves forward in Florida" -> 9: a South Florida
      competitor's concrete expansion — always include.
    - "UnitedHealth's $3B AI push has bots calling doctors" -> 8: it's UnitedHealth, and UHealth is
