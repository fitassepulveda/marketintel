# Per-executive personalization profiles.
#
# Each active profile gets its own copy of the briefing, emailed to its address.
# RIGHT NOW these are "name only" — no scoring weights — so each report is the SAME
# as the shared briefing, just with a "Good morning <name>," greeting. Personalization
# of the content comes later by adding weights (see the commented example at the bottom).
#
# Manage:
#   python scripts/personalize.py --list-profiles   # who's configured
#   python scripts/personalize.py --dry-run         # build each report locally, don't send
#
# Fields: name (identifier), title (role), display_name (greeting), email (delivery),
# active (true/false). display_name falls back to name if omitted.

defaults:
  threshold: 55
  max_stories: 12

profiles:
  - name: "Kique"
    title: "S&T Intern"
    display_name: "Kique"
    email: "wef28@miami.edu"
    active: true

  - name: "Jake"
